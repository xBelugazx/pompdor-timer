<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 350px;
            background-color: #FADADD;
            text-align: center;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px 0;
        }

        canvas {
            background-color: #FADADD;
            margin-bottom: 10px;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .btn-group button {
            font-size: 14px;
            font-weight: bold;
            width: 65px;
            padding: 6px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
        }

        .btn-group button:hover {
            background-color: #eee;
        }

        .ad-banner {
            display: block;
            margin: 15px auto 5px auto;
            width: 90%;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-decoration: none;
            overflow: hidden;
        }

        /* 외부 이미지 대신 자체 회색 박스로 대체 */
        .ad-placeholder {
            width: 100%;
            height: 60px;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #adb5bd;
            font-size: 12px;
            font-weight: bold;
        }

        .ad-text {
            font-size: 11px;
            color: #666;
            padding: 3px 0;
            background: #f9f9f9;
        }

        .bmc-btn {
            display: inline-block;
            margin-top: 5px;
            padding: 8px 15px;
            background-color: #FFDD00;
            color: #000000;
            font-weight: bold;
            font-size: 13px;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #e5c700;
        }

        .bmc-btn:hover {
            background-color: #ffea4d;
        }
    </style>
</head>

<body>
    <canvas id="timerCanvas" width="300" height="300"></canvas>

    <div class="btn-group">
        <button id="startBtn">시작</button>
        <button id="pauseBtn">멈춤</button>
        <button id="resetBtn">초기화</button>
    </div>

    <a href="https://네제휴마케팅링크.com" target="_blank" class="ad-banner">
        <div class="ad-placeholder">광고 배너 자리</div>
        <div class="ad-text">추천 집중력 템 구경하기 (Ad)</div>
    </a>

    <a href="https://www.buymeacoffee.com/네아이디" target="_blank" class="bmc-btn">
        ☕ 개발자에게 커피 한 잔 사주기
    </a>

    <script src="popup.js"></script>
</body>

</html>
