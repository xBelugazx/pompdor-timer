<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>휴식 시간!</title>
    <style>
        body {
            background-color: #FADADD;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }

        h1 {
            color: #D32F2F;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            line-height: 1.5;
        }

        button {
            margin-top: 25px;
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            background-color: #fff;
            border: 2px solid #D32F2F;
            border-radius: 8px;
            cursor: pointer;
            color: #D32F2F;
        }

        button:hover {
            background-color: #D32F2F;
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>⏰ 25분 종료!</h1>
    <p>고생하셨습니다.<br>이제 5분 동안 눈을 감고 푹 쉬세요!</p>
    <button id="closeBtn">알림 끄기</button>

    <script src="alert.js"></script>
</body>

</html>
